<!--
  WordPress 嵌入方式：
  1) 編輯頁面 → 新增區塊 → 選「自訂 HTML」(Custom HTML)
  2) 貼上底下這段，把 <你的帳號> 與 <repo名稱> 換成你的
  3) 高度(height)可自行調整；width:100% 會自動滿版
  （若用 Elementor：拉一個「HTML」小工具，貼上同一段）
-->
<div style="position:relative;width:100%;max-width:1100px;margin:0 auto">
  <iframe
    src="https://<你的帳號>.github.io/<repo名稱>/"
    title="台灣無人機空域圖 · 禁限航區即時查詢"
    loading="lazy"
    style="width:100%;height:640px;border:0;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.12)">
  </iframe>
</div>
